<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Crie sua conta</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .btn-voltar {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #764ba2;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: opacity 0.3s;
        }

        .btn-voltar:hover { opacity: 0.7; }

        .form-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .campo {
            margin-bottom: 20px;
        }

        .campo label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        .campo input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        .campo input:focus {
            border-color: #764ba2;
        }

        .btn-enviar {
            width: 100%;
            padding: 14px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-enviar:hover {
            background: #5a3680;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-voltar">← Voltar para Home</a>

    <div class="form-card">
        <h2>Criar Conta</h2>
        <form>
            <div class="campo">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: João Silva" required>
            </div>

            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="email@exemplo.com" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha" required>
            </div>

            <button type="submit" class="btn-enviar">Cadastrar</button>
        </form>
    </div>

</body>
</html>
